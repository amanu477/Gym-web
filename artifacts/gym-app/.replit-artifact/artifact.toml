kind = "mobile"
previewPath = "/gym-app/"
title = "Elite Fitness Mobile"
version = "1.0.0"
id = "artifacts/gym-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/gym-app/" ]
localPort = 26154

[services.development]
run = "pnpm --filter @workspace/gym-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gym-app", "run", "serve" ]

[services.env]
PORT = "26154"
BASE_PATH = "/gym-app/"
